<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenRadar | Secure Bookmark & Read-Later Hub</title>
  <meta name="description" content="ZenRadar - Decentralized E2EE Bookmark & Read-Later Hub.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font-sans: 'Outfit', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;

      --accent: #f59e0b;
      --accent-hover: #d97706;
      --accent-light: rgba(245, 158, 11, 0.1);
    }

    [data-theme="light"] {
      --bg-app: #f4f5f7;
      --bg-sidebar: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-color: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(0, 0, 0, 0.16);
      --input-bg: #f8fafc;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg-app: #0b0f17;
      --bg-sidebar: #111726;
      --bg-card: #161e2e;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.16);
      --input-bg: #0f172a;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-app);
      color: var(--text-primary);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* Auth Overlay */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 15, 23, 0.88);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      outline: none;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .btn-accent {
      background: var(--accent);
      color: #ffffff;
    }

    .btn-accent:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--input-bg);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    /* Main Layout */
    .app-container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 24px;
    }

    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .nav-item:hover,
    .nav-item.active {
      background: var(--accent-light);
      color: var(--accent);
    }

    .nav-count {
      margin-left: auto;
      font-size: 0.75rem;
      background: var(--input-bg);
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .search-box {
      width: 320px;
    }

    .search-box input {
      width: 100%;
      padding: 8px 12px;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      outline: none;
    }

    .cards-grid {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      align-content: start;
    }

    .bookmark-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .bookmark-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .card-domain {
      font-size: 0.75rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag-pill {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }

    .card-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
      padding-top: 10px;
      border-top: 1px solid var(--border-color);
    }

    .icon-action {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
    }

    .icon-action:hover,
    .icon-action.active {
      color: var(--accent);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-card {
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-md);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <!-- Auth Overlay -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="ti ti-radar"></i> ZenRadar
      </div>
      <p style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 24px;">
        Decentralized Bookmark & Read-Later Hub
      </p>
      <form onsubmit="event.preventDefault(); window.login();">
        <div class="form-group">
          <label class="form-label">Identity</label>
          <input type="text" id="user-input" class="form-input" placeholder="e.g. dev" required>
        </div>
        <div class="form-group">
          <label class="form-label">Master Passphrase</label>
          <input type="password" id="pass-input" class="form-input" placeholder="••••••••••••" required>
        </div>
        <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 10px;">
          <i class="ti ti-lock-open"></i> Unlock Radar
        </button>
      </form>
    </div>
  </div>

  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <i class="ti ti-radar"></i> ZenRadar
      </div>

      <ul class="nav-list">
        <li class="nav-item active" onclick="setFilter('all')">
          <i class="ti ti-bookmarks"></i> All Links
          <span class="nav-count" id="count-all">0</span>
        </li>
        <li class="nav-item" onclick="setFilter('unread')">
          <i class="ti ti-clock"></i> Read Later
          <span class="nav-count" id="count-unread">0</span>
        </li>
        <li class="nav-item" onclick="setFilter('fav')">
          <i class="ti ti-star"></i> Favorites
          <span class="nav-count" id="count-fav">0</span>
        </li>
      </ul>

      <div style="display: flex; gap: 10px; margin-top: auto;">
        <button class="btn btn-secondary" style="flex: 1;" onclick="toggleTheme()"><i class="ti ti-sun" id="theme-icon"></i></button>
        <button class="btn btn-secondary" style="flex: 1;" onclick="logout()"><i class="ti ti-lock"></i></button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="search-box">
          <input type="text" placeholder="Search title, URL, tags..." oninput="handleSearch(this.value)">
        </div>
        <button class="btn btn-accent" onclick="openAddModal()">
          <i class="ti ti-plus"></i> Add Link
        </button>
      </header>

      <div id="cards-container" class="cards-grid">
        <!-- Dynamic Cards -->
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="font-size: 1.2rem; font-weight: 700;">Add Bookmark Link</h3>
        <button class="btn btn-secondary" style="padding: 4px 8px;" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <form onsubmit="event.preventDefault(); saveLink();">
        <div class="form-group">
          <label class="form-label">URL</label>
          <input type="url" id="link-url" class="form-input" placeholder="https://example.com/article" required>
        </div>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" id="link-title" class="form-input" placeholder="e.g. Great P2P Architecture Guide" required>
        </div>
        <div class="form-group">
          <label class="form-label">Tag</label>
          <input type="text" id="link-tag" class="form-input" placeholder="e.g. Dev, Music, AI">
        </div>
        <div class="form-group">
          <label class="form-label">Description / Excerpt</label>
          <textarea id="link-desc" class="form-textarea" rows="3" placeholder="Key takeaways..."></textarea>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px;">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-accent">Save Bookmark</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentTheme = localStorage.getItem('theme') || 'light';
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', currentTheme);
      const icon = document.getElementById('theme-icon');
      if (icon) icon.className = currentTheme === 'light' ? 'ti ti-sun' : 'ti ti-moon';
    }
    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', currentTheme);
      applyTheme();
    }
    document.addEventListener('DOMContentLoaded', applyTheme);
  </script>

  <script type="module">
    import ZEN from 'https://cdn.jsdelivr.net/gh/scobru/zen@main/zen.min.js';

    let zen;
    let pair;
    let links = {};
    let activeFilter = 'all';
    let searchQuery = '';

    const relays = ["wss://delay.scobrudot.dev/zen", "wss://zen.akao.io:8420/zen"];
    zen = new ZEN({ peers: relays });

    async function login() {
      const u = document.getElementById('user-input').value || sessionStorage.getItem('zenradar_user');
      const p = document.getElementById('pass-input').value || sessionStorage.getItem('zenradar_pass');
      if (!u || !p) return;

      pair = await ZEN.pair(null, { seed: u + p });
      sessionStorage.setItem('zenradar_user', u);
      sessionStorage.setItem('zenradar_pass', p);
      document.getElementById('auth-overlay').classList.add('hidden');

      zen.get('~' + pair.pub).get('zenradar').map().on((data, soul) => {
        if (!data) delete links[soul];
        else links[soul] = { soul, ...data };
        render();
      });
    }

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    function saveLink() {
      const id = 'link_' + Date.now();
      const url = document.getElementById('link-url').value;
      const title = document.getElementById('link-title').value;
      const tag = document.getElementById('link-tag').value;
      const desc = document.getElementById('link-desc').value;

      const record = { url, title, tag, desc, favorite: false, read: false, timestamp: Date.now() };

      zen.get('~' + pair.pub).get('zenradar').get(id).put(record, (ack) => {
        if (!ack.err) closeModal();
      }, { authenticator: pair });
    }

    function toggleFav(soul) {
      if (links[soul]) {
        const val = !links[soul].favorite;
        links[soul].favorite = val;
        zen.get('~' + pair.pub).get('zenradar').get(soul).get('favorite').put(val, null, { authenticator: pair });
        render();
      }
    }

    function toggleRead(soul) {
      if (links[soul]) {
        const val = !links[soul].read;
        links[soul].read = val;
        zen.get('~' + pair.pub).get('zenradar').get(soul).get('read').put(val, null, { authenticator: pair });
        render();
      }
    }

    function deleteLink(soul) {
      if (confirm('Delete bookmark?')) {
        zen.get('~' + pair.pub).get('zenradar').get(soul).put(null, null, { authenticator: pair });
      }
    }

    function render() {
      const container = document.getElementById('cards-container');
      container.innerHTML = '';
      const list = Object.values(links);

      document.getElementById('count-all').textContent = list.length;
      document.getElementById('count-unread').textContent = list.filter(l => !l.read).length;
      document.getElementById('count-fav').textContent = list.filter(l => l.favorite).length;

      let filtered = list;
      if (activeFilter === 'unread') filtered = filtered.filter(l => !l.read);
      if (activeFilter === 'fav') filtered = filtered.filter(l => l.favorite);

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(l => (l.title || '').toLowerCase().includes(q) || (l.url || '').toLowerCase().includes(q) || (l.tag || '').toLowerCase().includes(q));
      }

      filtered.forEach(l => {
        let domain = 'link';
        try { domain = new URL(l.url).hostname; } catch(e) {}

        const card = document.createElement('div');
        card.className = 'bookmark-card';
        card.innerHTML = `
          <div class="card-domain"><i class="ti ti-world"></i> ${escapeHtml(domain)}</div>
          <div class="card-title">${escapeHtml(l.title)}</div>
          ${l.desc ? `<div class="card-desc">${escapeHtml(l.desc)}</div>` : ''}
          ${l.tag ? `<div class="card-tags"><span class="tag-pill">${escapeHtml(l.tag)}</span></div>` : ''}
          <div class="card-actions">
            <div style="display: flex; gap: 8px;">
              <button class="icon-action ${l.favorite ? 'active' : ''}" onclick="toggleFav('${l.soul}')" title="Favorite">
                <i class="ti ti-star${l.favorite ? '-filled' : ''}"></i>
              </button>
              <button class="icon-action ${l.read ? 'active' : ''}" onclick="toggleRead('${l.soul}')" title="${l.read ? 'Mark Unread' : 'Mark Read'}">
                <i class="ti ti-check"></i>
              </button>
            </div>
            <div style="display: flex; gap: 8px;">
              <a href="${escapeHtml(l.url)}" target="_blank" rel="noopener" class="icon-action" title="Open Link"><i class="ti ti-external-link"></i></a>
              <button class="icon-action" onclick="deleteLink('${l.soul}')" title="Delete"><i class="ti ti-trash"></i></button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function escapeHtml(str) {
      return (str || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    window.login = login;
    window.logout = logout;
    window.saveLink = saveLink;
    window.toggleFav = toggleFav;
    window.toggleRead = toggleRead;
    window.deleteLink = deleteLink;
    window.setFilter = (f) => { activeFilter = f; render(); };
    window.handleSearch = (q) => { searchQuery = q; render(); };
    window.openAddModal = () => document.getElementById('modal-overlay').classList.remove('hidden');
    window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');

    if (sessionStorage.getItem('zenradar_user') && sessionStorage.getItem('zenradar_pass')) {
      login();
    }
  </script>
</body>

</html>
